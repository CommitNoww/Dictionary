<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유반사전</title>
    <style>
        body {
            background-color: #EDF1FD;
        }
        /*검색바 스타일*/
        .search-container {
            width: 80%;
            height: 70px;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        /*로고 이미지 스타일*/
        .icon {
            padding: 20px 0px 20px 20px;
            width: 40px;
            height: 40px;
        }
        .search-title {
            width: 10%;
            padding: 20px 20px 20px 0px;
            background-color: #EDF1FD;
            border: none;
        }

        .search-form {
            display: flex;
            background-color: white;
            border-radius: 15px;
            padding: 5px;
            max-width: 500px;
            width: 100%;
        }
        /*검색 입력하는 곳 스타일*/
        .search-input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: none;
            background: transparent;
            outline: none;
        }

        .search-button {
            padding: 10px 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .search-button:hover {
            background-color: #0b7dda;
        }
        /*구분선 스타일*/
        .border-line {
            width: 100%;
            color: black;
        }
        /*단어 정보 나오는 영역 스타일*/
        .word-item {
            text-align: left;
            background-color: white;
            border-radius: 8px;
            padding: 15px;
        }

        /*단어 뜻 설명 스타일*/
        .word-des {
            display: flex;
        }

        /*검색한 단어 스타일*/
        .word-title {
            font: bold;
            font-size: 18px;
            font-weight: bold;
            color: black;
            margin-bottom: 10px;
        }

        .word-type {
            color: mediumpurple;
            margin-right: 20px;
        }
        /*단어 설명 텍스트 스타일*/
        .word-description {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .word-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 50px;
            width: 50%;
        }

        .circle {
            text-align: center;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            background-color: white;
            border: 2px solid #007bff;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .circle h2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #007bff;
        }

        .emotions {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .positive, .negative {
            padding: 0;
            margin-right: 20px;
        }

        .positive ul {
            color: #007bff;
            margin: 10px 0;
        }

        .positive li {
            padding: 5px;
        }

        .negative ul {
            color: #e74c3c;
            margin: 10px 0;
        }

        .negative li {
            padding: 5px;
        }
    </style>
</head>

<body>
    <div class="search-container">
        <img class="icon" src="./icon.png">
        <button class="search-title">유반사전</button>
        <form class="search-form">
            <input type="text" id="searchInput" class="search-input" placeholder="검색어를 입력하세요..." aria-label="검색">
            <button type="submit" class="search-button" onclick="subitSearch(event)">검색</button>
        </form>
    </div>
    <hr class="border-line" />
    <div class="word-item" id="word-item">
    </div>
    <hr class="border-line" />
    <div class="content" id="content">
    </div>
    <script>
    </script>
</body>
</html>
